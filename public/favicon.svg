<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1A3FAA"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- Shield (white) -->
  <path d="M256 62 L394 112 L394 276 Q394 384 256 442 Q118 384 118 276 L118 112 Z" fill="white"/>

  <!-- Shield inner tint -->
  <path d="M256 76 L380 122 L380 276 Q380 374 256 428 Q132 374 132 276 L132 122 Z" fill="#EFF6FF"/>

  <!-- Open book — left page -->
  <path d="M172 200 Q172 318 180 326 Q214 310 249 308 L249 192 Q214 184 172 200 Z" fill="#1A56DB"/>
  <!-- Open book — right page -->
  <path d="M340 200 Q340 318 332 326 Q298 310 263 308 L263 192 Q298 184 340 200 Z" fill="#1E3FAA"/>
  <!-- Spine -->
  <rect x="248" y="190" width="16" height="138" rx="6" fill="white"/>

  <!-- Left page lines -->
  <rect x="190" y="228" width="50" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="190" y="254" width="50" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="190" y="280" width="38" height="10" rx="5" fill="white" opacity="0.5"/>
  <!-- Right page lines -->
  <rect x="272" y="228" width="50" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="272" y="254" width="50" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="272" y="280" width="38" height="10" rx="5" fill="white" opacity="0.5"/>

  <!-- Gold 5-point star -->
  <polygon points="256,88 271,133 318,133 281,159 295,204 256,178 217,204 231,159 194,133 241,133" fill="#FFD166"/>
  <polygon points="256,88 271,133 318,133 281,159 295,204 256,178 217,204 231,159 194,133 241,133" fill="none" stroke="#F59E0B" stroke-width="3"/>

  <!-- Gold ribbon bottom -->
  <path d="M144 354 Q200 384 256 390 Q312 384 368 354 L368 376 Q312 406 256 412 Q200 406 144 376 Z" fill="#FFD166"/>
</svg>
